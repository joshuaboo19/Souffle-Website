<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Fluff Lab | Artisanal Soufflé Pancakes</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&family=Playfair+Display:wght@600;800&display=swap" rel="stylesheet">

    <style>
        /* --- DESIGN TOKENS --- */
        :root {
            --cream: #FFF8F0;
            --pink: #FFD6D6;
            --gold: #FFD700;
            --brown: #3E1C00;
            --white: #FFFFFF;
            --transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            --shadow: 0 15px 35px rgba(62, 28, 0, 0.08);
        }

        /* --- BASE STYLES --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body { 
            font-family: 'Lato', sans-serif; 
            background-color: var(--cream); 
            color: var(--brown); 
            line-height: 1.7;
            overflow-x: hidden;
        }
        h1, h2, h3 { font-family: 'Playfair Display', serif; }
        a { text-decoration: none; color: inherit; }
        img { max-width: 100%; display: block; }

        .container { max-width: 1200px; margin: 0 auto; padding: 0 25px; }
        .section-padding { padding: 100px 0; }
        .text-center { text-align: center; }

        /* --- BUTTONS --- */
        .btn {
            display: inline-block;
            padding: 16px 32px;
            border-radius: 50px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: var(--transition);
            border: none;
            font-size: 0.9rem;
        }
        .btn-primary { background: var(--brown); color: var(--cream); }
        .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(62, 28, 0, 0.2); }
        .btn-outline { border: 2px solid var(--brown); color: var(--brown); background: transparent; }
        .btn-outline:hover { background: var(--brown); color: var(--cream); }

        /* --- ANIMATIONS --- */
        .fade-in { opacity: 0; transform: translateY(30px); transition: 0.8s ease-out; }
        .fade-in.visible { opacity: 1; transform: translateY(0); }

        /* --- NAVIGATION --- */
        nav {
            position: fixed; top: 0; width: 100%; z-index: 1000;
            background: rgba(255, 248, 240, 0.9);
            backdrop-filter: blur(10px);
            padding: 20px 0;
            transition: var(--transition);
        }
        nav .container { display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 1.5rem; font-weight: 800; letter-spacing: -1px; }
        .nav-links { display: flex; gap: 30px; align-items: center; }
        .hamburger { display: none; cursor: pointer; font-size: 1.5rem; }

        /* --- HERO --- */
        .hero {
            height: 100vh;
            background: linear-gradient(rgba(62, 28, 0, 0.4), rgba(62, 28, 0, 0.4)), 
                        url('https://images.unsplash.com/photo-1575853121743-60c24f0a7502?q=80&w=2000') center/cover no-repeat;
            display: flex; align-items: center; justify-content: center;
            color: var(--white); text-align: center;
        }
        .hero h1 { font-size: clamp(3rem, 10vw, 6rem); line-height: 1.1; margin-bottom: 20px; }
        .hero p { font-size: 1.3rem; margin-bottom: 40px; max-width: 700px; font-weight: 300; }
        .hero-btns { display: flex; gap: 20px; justify-content: center; }

        /* --- URGENCY BANNER --- */
        .urgency-banner {
            background: var(--gold); padding: 12px 0;
            font-weight: 700; text-align: center;
            position: sticky; top: 80px; z-index: 900;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        /* --- USP SECTION --- */
        .usp-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; margin-top: 50px; }
        .usp-card {
            background: var(--white); padding: 50px 30px;
            border-radius: 30px; text-align: center;
            transition: var(--transition); box-shadow: var(--shadow);
        }
        .usp-card:hover { transform: translateY(-10px); }
        .usp-icon { font-size: 3.5rem; margin-bottom: 20px; display: block; }

        /* --- MENU SECTION --- */
        .menu-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 40px; margin-top: 60px; }
        .menu-card {
            background: var(--white); border-radius: 25px; overflow: hidden;
            box-shadow: var(--shadow); transition: var(--transition);
        }
        .menu-img { height: 280px; overflow: hidden; position: relative; }
        .menu-img img { width: 100%; height: 100%; object-fit: cover; transition: 0.6s; }
        .menu-card:hover img { transform: scale(1.1); }
        .menu-info { padding: 30px; }
        .menu-price { font-size: 1.4rem; font-weight: 700; color: var(--brown); margin: 15px 0; }

        /* --- COUNTDOWN --- */
        .timer-section { background: var(--pink); border-radius: 40px; padding: 60px 20px; margin-top: 50px; }
        #countdown { display: flex; justify-content: center; gap: 30px; margin-top: 30px; }
        .time-box { display: flex; flex-direction: column; align-items: center; }
        .time-num { font-size: 3.5rem; font-family: 'Playfair Display', serif; font-weight: 800; }
        .time-label { text-transform: uppercase; font-size: 0.8rem; letter-spacing: 2px; }

        /* --- FAQ --- */
        .faq-container { max-width: 800px; margin: 50px auto 0; }
        .faq-item { background: var(--white); margin-bottom: 15px; border-radius: 15px; overflow: hidden; border: 1px solid rgba(62,28,0,0.05); }
        .faq-question { padding: 25px; cursor: pointer; display: flex; justify-content: space-between; font-weight: 700; align-items: center; }
        .faq-answer { padding: 0 25px; max-height: 0; overflow: hidden; transition: 0.4s ease-in-out; color: #666; }

        /* --- GALLERY --- */
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px; margin-top: 50px; }
        .gallery-grid img { height: 300px; width: 100%; object-fit: cover; border-radius: 20px; transition: 0.4s; cursor: pointer; }
        .gallery-grid img:hover { filter: brightness(0.8); }

        /* --- MODAL --- */
        .modal {
            position: fixed; top:0; left:0; width:100%; height:100%; }
